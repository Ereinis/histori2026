<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Besëlidhja e Lezhës</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, sans-serif;
      color: #f5d9a6;
        background:
          linear-gradient(rgba(134, 113, 74, 0.578), rgba(172, 133, 78, 0.244)),
          url("background.jpg");

      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 64px;
      border-bottom: 1px solid rgba(255, 200, 140, 0.25);
    }

    .logo {
      font-family: Cinzel, serif;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    nav {
      display: flex;
      gap: 28px;
    }

    nav a {
      text-decoration: none;
      color: #e8c98b;
      font-size: 15px;
      opacity: 0.85;
    }

    nav a:hover {
      opacity: 1;
    }

    /* ===== PAGE ===== */
    .cases-page {
      padding: 90px 64px 120px;
    }

    .cases-header {
      max-width: 760px;
      margin: 0 auto 70px;
      text-align: center;
    }

    .cases-header h1 {
      font-family: Cinzel, serif;
      font-size: 52px;
      margin-bottom: 18px;
    }

    .cases-header p {
      font-size: 17px;
      line-height: 1.7;
      opacity: 0.85;
    }

    /* ===== GRID ===== */
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 36px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== CARD ===== */
    .case-card {
      background: rgba(32, 16, 8, 0.9);
      border: 1px solid rgba(255, 190, 120, 0.3);
      border-radius: 18px;
      padding: 32px;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .case-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 190, 120, 0.6);
    }

    .case-tag {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #f2c87c;
      margin-bottom: 12px;
      display: inline-block;
    }

    .case-card h3 {
      font-family: Cinzel, serif;
      font-size: 22px;
      margin-bottom: 14px;
    }

    .case-card p {
      font-size: 15px;
      line-height: 1.65;
      opacity: 0.85;
      margin-bottom: 22px;
    }

    .case-card span {
      font-size: 14px;
      font-weight: 500;
      color: #f2c87c;
    }

    /* ===== VIDEO SECTION ===== */
.video-section {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 50px;
  align-items: center;
}

.video-box {
  width: 50%;
  background: rgba(32, 16, 8, 0.85);
  border: 1px solid rgba(255, 190, 120, 0.35);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
}

.video-box video {
  width: 100%;
  border-radius: 14px;
}

.video-caption {
  margin-top: 14px;
  font-size: 14px;
  color: #f2c87c;
  text-align: center;
  opacity: 0.85;
}
.chart-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 30px;        /* e bën më të largët nga teksti */
}

.chart-wrapper img {
  width: 55%;              /* e bën më të vogël */
  max-width: 700px;        /* nuk e bën shumë të madhe në desktop */
  filter: brightness(1); /* e errëson imazhin */
  border-radius: 12px;     /* e bën më bukur */
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.749);
}


    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {

  header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 16px 20px;
  }

  body {
    background-size: cover;
    background-position: center top;
    background-attachment: scroll;
  }

  .cases-page {
    padding: 60px 20px 90px;
  }

  .cases-header h1 {
    font-size: 36px;
  }

}
nav {
  display: flex;
  gap: 22px;
  overflow-x: auto;
  white-space: nowrap;
  width: 100%;
  padding-bottom: 6px;
}

nav::-webkit-scrollbar {
  display: none;
}

nav a {
  flex: 0 0 auto;
}
  </style>
</head>
